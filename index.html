<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-color: #f4f4f4;
            --sheet-bg: #ffffff;
            --accent-color: #333;
        }
        body { font-family: sans-serif; background: var(--bg-color); color: var(--accent-color); padding: 20px; }
        .controls { margin-bottom: 20px; text-align: center; background: #fff; padding: 20px; border-radius: 8px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        /* 各ページのスタイル */
        .sheet-page {
            width: 900px;
            margin: 0 auto 40px auto;
            background: var(--sheet-bg);
            padding: 40px;
            border: 1px solid #ddd;
        }
        h1 { text-align: center; border-bottom: 2px solid var(--accent-color); padding-bottom: 10px; margin-bottom: 20px; font-size: 24px; }
        .page-number { text-align: right; font-size: 12px; color: #999; margin-bottom: 5px; }
        
        table { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
        th, td { border: 1px solid #ccc; padding: 8px; font-size: 13px; }
        th { background: #eee; }
        .item-name { width: 35%; font-weight: bold; }
        .check-group { width: 30%; text-align: center; }
        .pref-group { width: 35%; text-align: center; }
        
        label { cursor: pointer; display: inline-block; padding: 2px 4px; border-radius: 4px; }
        label:hover { background: #f0f0f0; }
        
        textarea { width: 100%; height: 100px; border: 1px solid #ccc; font-family: inherit; resize: none; margin-top: 10px; }
        .footer-note { margin-top: 20px; border-top: 1px solid #eee; padding-top: 10px; }
        
        .btn-download {
            background: #2a9d8f; color: white; border: none; padding: 12px 24px;
            font-size: 18px; border-radius: 30px; cursor: pointer; transition: 0.3s; font-weight: bold;
        }
        .btn-download:hover { background: #264653; transform: scale(1.05); }
    </style>
</head>
<body>

    <p>全項目を入力後、下のボタンを押してください。ブラウザが6枚の画像を順に保存します。</p>
    <button class="btn-download" onclick="downloadAllPages()">📸 6枚まとめて保存する</button>
</div>

<div id="pages-container"></div>

"同性NPCに対して恋愛感情を持つ", "同性PCに対して恋愛感情を持つ", "自PCがNPCを殺害する必要がある", "自PCがクローン等本人ではない", "同卓PCやKPCがクローン等本人ではない", "シナリオ描写によって自PCの感情を指定/強制される", "シナリオ描写によって自PCの行動を指定/強制される", "神話的事象によって自PCの感情を指定/強制される", "自PCの口調や話し方を強制される", "交渉等の場面で技能判定ではなくRPで進めなければならない", "人間ができるレベルの特殊技能や特殊能力を持っている", "人間ができないレベルの特殊能力を持っている", "自PCがいじめを受ける", "自PCが虐待を受ける", "自PCが性的な暴力を受ける", "自PCのペットに対する残虐描写が入る", "自PCが拷問を受ける", "自PCがハラスメント行為を受ける", "自PCが他PCから糾弾される", "PC内で1対多/ハブにされるような展開がある", "自PCが記憶を失う", "自PCが異性NPCに恋愛感情を持たれる", "自PCが同性NPCに恋愛感情を持たれる", "自PCが異性の他PCに恋愛感情を持たれる", "自PCが同性の他PCに恋愛感情を持たれる", "夢オチエンディング", "続編を匂わせるオチ", "メタフィクションが関わるエンディング", "パラレルワールド/別世界線へ行く", "自PCの記憶が消えるエンディング", "秘匿内で自PCが記憶喪失であるという指定がある", "自PCが自覚なしに記憶を改ざんされている", "特定のHOのみ情報量や行動が多い", "特定のHOの行動が全体のロストやシナリオのエンド分岐に直結する", "秘匿内で自PCが他PCへの敵意を抱いているという指定がある", "極端に自由度の低いHO", "シナリオ中に特殊な能力や技能を使う場面が用意されている", "秘匿内で性別が指定されている", "秘匿内で年齢が指定されている", "秘匿内で外見が指定されている", "秘匿内で性格が指定されている", "秘匿と公言されていないシナリオで突然秘匿が飛んでくる", "セッションの録画", "セッションの見学", "PL発言の多用", "同卓者の自主ロスト", "シナリオ内で事前情報扱いではない情報の事前伝達", "極端にロスト率が上がる場合の助言", "未公開の推奨技能/能力値の伝達", "地雷回避のための事前情報提供"];

    const pagesContainer = document.getElementById('pages-container');
    const itemsPerPage = Math.ceil(items.length / 6); // 1ページあたりの項目数

    for (let i = 0; i < 6; i++) {
        const pageDiv = document.createElement('div');
        pageDiv.className = 'sheet-page';
        pageDiv.id = `page-${i}`;
        
        let html = `<div class="page-number">Page ${i + 1} / 6</div>`;
        html += `<h1>CoC地雷チェックシート</h1>`;
        html += `<table><thead><tr><th>項目</th><th>告知希望</th><th>スタンス</th></tr></thead><tbody>`;
        
        const start = i * itemsPerPage;
        const end = Math.min(start + itemsPerPage, items.length);
        
        for (let j = start; j < end; j++) {
            html += `
                <tr>
                    <td class="item-name">${items[j]}</td>
                    <td class="check-group">
                        <label><input type="checkbox">事前</label>
                        <label><input type="checkbox">直前</label>
                    </td>
                    <td class="pref-group">
                        <label><input type="radio" name="pref_${j}" value="1" onclick="toggleRadio(this)">不可</label>
                        <label><input type="radio" name="pref_${j}" value="2" onclick="toggleRadio(this)">不快</label>
                        <label><input type="radio" name="pref_${j}" value="3" onclick="toggleRadio(this)">好き</label>
                    </td>
                </tr>`;
        }
        html += `</tbody></table>`;
        
        // 最後のページにだけ自由記述欄を追加
        if (i === 5) {
            html += `
            <div class="footer-note">
                <h3>プレイヤー補足欄</h3>
                <textarea placeholder="個別の補足..."></textarea>
            </div>
            <div class="footer-note">
                <h3>その他自由記述</h3>
                <textarea placeholder="上記以外の事項..."></textarea>
            </div>`;
        }
        
        pageDiv.innerHTML = html;
        pagesContainer.appendChild(pageDiv);
    }

    function toggleRadio(radio) {
        if (radio.dataset.checked === "true") {
            radio.checked = false;
            radio.dataset.checked = "false";
        } else {
            const name = radio.name;
            document.querySelectorAll(`input[name="${name}"]`).forEach(r => r.dataset.checked = "false");
            radio.dataset.checked = "true";
        }
    }

    async function downloadAllPages() {
        const btn = document.querySelector('.btn-download');
        btn.innerText = "生成中...";
        btn.disabled = true;

        for (let i = 0; i < 6; i++) {
            const canvas = await html2canvas(document.getElementById(`page-${i}`), { scale: 2 });
            const link = document.createElement('a');
            link.download = `CoC地雷チェック_${i + 1}.png`;
            link.href = canvas.toDataURL();
            link.click();
            // 連続ダウンロードでブラウザが止まらないよう少し待機
            await new Promise(resolve => setTimeout(resolve, 500));
        }

        btn.innerText = "📸 6枚まとめて保存する";
        btn.disabled = false;
    }
</script>
</body>
</html>
